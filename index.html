<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ජ්‍යොතිෂ පරීක්ෂක - ලග්නය සහ නැකත</title>
    <style>
        :root { --primary-color: #6200ea; --secondary-color: #03dac6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        h2 { color: var(--primary-color); margin-bottom: 20px; }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--primary-color); color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #4500b5; }
        #result-box { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; line-height: 1.6; }
        .success { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
        .error { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }
        .info { font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>ජ්‍යොතිෂ තොරතුරු</h2>
    
    <div class="input-group">
        <label>උපන් දිනය:</label>
        <input type="date" id="birthDate">
    </div>

    <div class="input-group">
        <label>උපන් වේලාව:</label>
        <input type="time" id="birthTime">
    </div>

    <div class="input-group">
        <label>උපන් නගරය:</label>
        <select id="citySelect">
            <option value="7.25,80.34">කෑගල්ල</option>
            <option value="6.92,79.86">කොළඹ</option>
            <option value="7.29,80.63">මහනුවර</option>
            <option value="6.05,80.21">ගාල්ල</option>
            <option value="8.31,80.41">අනුරාධපුරය</option>
            <option value="9.66,80.01">යාපනය</option>
            <option value="6.68,80.39">රත්නපුරය</option>
            <option value="7.48,80.36">කුරුණෑගල</option>
            <option value="6.98,81.05">බදුල්ල</option>
            <option value="7.71,81.70">මඩකලපුව</option>
        </select>
    </div>
    
    <button onclick="calculateAstrology()">පරීක්ෂා කරන්න</button>

    <div id="result-box"></div>
</div>

<script>
    async function calculateAstrology() {
        const birthDate = document.getElementById('birthDate').value;
        const birthTime = document.getElementById('birthTime').value;
        const cityData = document.getElementById('citySelect').value.split(',');
        const lat = cityData[0];
        const lon = cityData[1];

        if (!birthDate || !birthTime) {
            showResponse("කරුණාකර දිනය සහ වේලාව ඇතුළත් කරන්න.", "error");
            return;
        }

        const dateParts = birthDate.split('-');
        const timeParts = birthTime.split(':');
        
        const year = dateParts[0];
        const month = dateParts[1];
        const day = dateParts[2];
        const hour = timeParts[0];
        const min = timeParts[1];

        showResponse("ගණනය කරමින් පවතී...", "success");

        const apiUrl = `/calculate?year=${year}&month=${month}&day=${day}&hour=${hour}&min=${min}&lat=${lat}&lon=${lon}`;

        try {
            const response = await fetch(apiUrl);
            const data = await response.json();

            if (data.status === 'success') {
                const output = `
                    <div class="info">ඔබේ ලග්නය: <b>${data.lagnaya}</b></div>
                    <div class="info">ඔබේ නැකත: <b>${data.nakshata}</b></div>
                `;
                showResponse(output, "success");
            } else {
                showResponse("දෝෂයකි: " + data.error, "error");
            }
        } catch (error) {
            showResponse("සර්වර් එක සමඟ සම්බන්ධ විය නොහැක.", "error");
        }
    }

    function showResponse(msg, type) {
        const box = document.getElementById('result-box');
        box.style.display = 'block';
        box.innerHTML = msg;
        box.className = type;
    }
</script>

</body>
</html>
